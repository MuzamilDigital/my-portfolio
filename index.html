<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzamil Multi-Portfolio</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #f0f2f5; }
        header { background: #1a1a1a; color: white; padding: 30px; text-align: center; }
        .container { max-width: 1200px; margin: auto; padding: 20px; }
        h2 { text-align: center; border-bottom: 2px solid #1a73e8; padding-bottom: 10px; margin-top: 40px; }
        
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        /* Background ka masla theek karne ke liye image ki settings */
        .card img { 
            width: 100%; 
            height: 200px; 
            object-fit: cover; 
            display: block;
            background-color: #ddd; /* Agar image na aaye toh halka gray dikhayi de ga */
        }
        .card-content { padding: 10px; }
    </style>
</head>
<body>

<header>
    <h1>Muzamil Digital Hub</h1>
    <p>Graphic Design & Web Development Portfolio</p>
</header>

<div class="container">

    <h2>Naye Canva Designs</h2>
    <div class="grid">
        <div class="card">
            <img src="iphone-design.png" alt="iPhone Ad">
            <div class="card-content"><h3>iPhone 15 Ad</h3></div>
        </div>
        <div class="card">
            <img src="My-Burger-design.png" alt="Burger Ad">
            <div class="card-content"><h3>Burger Deal</h3></div>
        </div>
        <div class="card">
            <img src="Modern-car.png" alt="Car Ad">
            <div class="card-content"><h3>Luxury Car Review</h3></div>
        </div>
        <div class="card">
            <img src="House-design.png" alt="House Ad">
            <div class="card-content"><h3>Real Estate Ad</h3></div>
        </div>
    </div>

    <h2>Mera Purana Kaam</h2>
    <div class="grid">
        <div class="card">
            <img src="Black Panther.png" alt="Logo">
            <div class="card-content"><h3>Logo Design</h3></div>
        </div>
        <div class="card">
            <img src="coffee.png" alt="Coffee">
            <div class="card-content"><h3>Photography</h3></div>
        </div>
        <div class="card">
            <img src="my digital pic.png" alt="My Pic">
            <div class="card-content"><h3>Digital Profile</h3></div>
        </div>
        <div class="card">
            <img src="my-bg.png" alt="Background">
            <div class="card-content"><h3>Background Art</h3></div>
        </div>
    </div>

</div>

<footer>
    <p style="text-align: center; padding: 20px;">Contact: +923036780703</p>
</footer>

</body>
</html>
