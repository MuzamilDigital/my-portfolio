<!DOCTYPE html>
<html>
<head>
    <title>Muzamil Digital Gallery</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            text-align: center; 
            /* Shaam jaisa background (Sunset Gradient) */
            background: linear-gradient(135deg, #fceabb 0%, #f8b500 50%, #fb8817 100%);
            background-attachment: fixed;
            margin: 0; 
            padding: 20px; 
            color: #333;
        }
        .gallery { display: flex; justify-content: center; gap: 25px; padding: 20px; flex-wrap: wrap; }
        .card { 
            background: rgba(255, 255, 255, 0.9); /* Glass jaisa dabba */
            padding: 15px; 
            border-radius: 15px; 
            width: 280px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.2); 
            transition: 0.3s;
            border: 1px solid #ddd;
        }
        .card:hover { transform: scale(1.05); }
        .card img { width: 100%; border-radius: 10px; height: 350px; object-fit: cover; }
        .btn { 
            display: inline-block; 
            margin-top: 15px; 
            padding: 12px; 
            background: #25D366; 
            color: white; 
            text-decoration: none; 
            border-radius: 8px; 
            font-weight: bold; 
            width: 90%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <h1>Muzamil Digital Gallery</h1>
    <p>Professional Canva Designs & Creative Art</p>

    <div class="gallery">
        <div class="card">
            <img src="coffee.png" alt="Coffee">
            <h3>Morning Coffee</h3>
            <a href="https://wa.me/923036780703" class="btn">Order on WhatsApp</a>
        </div>

        <div class="card">
            <img src="penguins.png" alt="Penguins">
            <h3>Creative Penguins</h3>
            <a href="https://wa.me/923036780703" class="btn">Order on WhatsApp</a>
        </div>

        <div class="card">
            <img src="Black Panther.png" alt="Black Panther">
            <h3>Black Panther Design</h3>
            <a href="https://wa.me/923036780703" class="btn">Order on WhatsApp</a>
        </div>

        <div class="card">
            <img src="my digital pic.png" alt="Digital Art">
            <h3>My Digital Art</h3>
            <a href="https://wa.me/923036780703" class="btn">Order on WhatsApp</a>
        </div>
    </div>

</body>
</html>
