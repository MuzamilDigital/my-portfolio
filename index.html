<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzamil Gallery Portfolio</title>
    <style>
        body { 
            font-family: sans-serif; 
            margin: 0; 
            background-image: url('my-bg'); /* Aapka background */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }
        header { 
            background: rgba(0, 0, 0, 0.8); 
            padding: 40px; 
            text-align: center;
            border-bottom: 3px solid #1a73e8;
        }
        .gallery-container { 
            max-width: 1200px; 
            margin: 30px auto; 
            padding: 10px;
        }
        h2 { 
            text-align: center; 
            background: #1a73e8; 
            padding: 15px; 
            border-radius: 8px;
            margin: 40px 0 20px 0;
        }
        
        /* Gallery Style Layout */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }
        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 10px;
            border: 2px solid rgba(255,255,255,0.2);
            height: 250px;
            cursor: pointer;
            transition: transform 0.4s;
        }
        .gallery-item:hover {
            transform: scale(1.05);
            border-color: #1a73e8;
        }
        .gallery-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Images gallery ki tarah set hongi */
        }
        .image-caption {
            position: absolute;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            width: 100%;
            padding: 10px;
            font-size: 14px;
            text-align: center;
        }
    </style>
</head>
<body>

<header>
    <h1>Muzamil's Creative Gallery</h1>
    <p>Graphic Design & Professional Ads</p>
</header>

<div class="gallery-container">

    <h2>Naye Canva Designs</h2>
    <div class="gallery-grid">
        <div class="gallery-item">
            <img src="iphone-design" alt="iPhone Ad">
            <div class="image-caption">iPhone 15 Design</div>
        </div>
        <div class="gallery-item">
            <img src="My-Burger-design" alt="Burger Ad">
            <div class="image-caption">Burger & Fries Ad</div>
        </div>
        <div class="gallery-item">
            <img src="Modern-car" alt="Car Ad">
            <div class="image-caption">Luxury Car Review</div>
        </div>
        <div class="gallery-item">
            <img src="House-design" alt="House Ad">
            <div class="image-caption">Real Estate Design</div>
        </div>
    </div>

    <h2>Mera Purana Kaam</h2>
    <div class="gallery-grid">
        <div class="gallery-item">
            <img src="Black Panther" alt="Logo">
            <div class="image-caption">Black Panther Logo</div>
        </div>
        <div class="gallery-item">
            <img src="coffee" alt="Coffee">
            <div class="image-caption">Good Morning Coffee</div>
        </div>
        <div class="gallery-item">
            <img src="my digital pic" alt="My Pic">
            <div class="image-caption">Digital Profile</div>
        </div>
        <div class="gallery-item">
            <img src="penguins" alt="Penguins">
            <div class="image-caption">Nature Photography</div>
        </div>
    </div>

</div>

<footer style="text-align: center; padding: 40px; background: rgba(0,0,0,0.8);">
    <p>Contact for Design: +923036780703</p>
</footer>

</body>
</html>
