<!DOCTYPE html>
<html>
<head>
    <title>Muzamil Gallery</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f0f0f0; }
        .gallery { display: flex; justify-content: center; gap: 20px; padding: 20px; }
        .card { background: white; padding: 15px; border-radius: 10px; width: 250px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .card img { width: 100%; border-radius: 8px; }
        .btn { display: inline-block; margin-top: 10px; padding: 10px; background: #28a745; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Muzamil Digital Gallery</h1>

    <div class="gallery">
        <div class="card">
            <img src="coffee.png" alt="Coffee Poster">
            <h3>Morning Coffee</h3>
            <p>Minimalist design for cafes.</p>
            <a href="#" class="btn">Buy Design ($5)</a>
        </div>

        <div class="card">
            <img src="penguins.png" alt="Penguin Art">
            <h3>Creative Penguins</h3>
            <p>Colorful abstract nature art.</p>
            <a href="#" class="btn">Buy Design ($5)</a>
        </div>
    </div>

</body>
</html>
