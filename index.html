<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muzamil Creative Gallery</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            /* آپ کا اپنا بنایا ہوا بیک گراؤنڈ */
            background-image: url('my-bg.png'); 
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }
        header { 
            background: rgba(0, 0, 0, 0.85); 
            padding: 30px; 
            text-align: center;
            border-bottom: 4px solid #1a73e8;
        }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        .section-title { 
            text-align: center; 
            background: #1a73e8; 
            padding: 12px; 
            border-radius: 6px;
            font-size: 24px;
            margin: 40px 0 20px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        
        /* گیلری ڈیزائن */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: 0.3s;
            backdrop-filter: blur(5px);
        }
        .card:hover { transform: translateY(-8px); border-color: #1a73e8; }
        .card img { width: 100%; height: 200px; object-fit: cover; display: block; }
        
        .card-title {
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>Muzamil's Creative Gallery</h1>
    <p>Graphic Design & Professional Ads Portfolio</p>
</header>

<div class="container">

    <div class="section-title">Naye Canva Designs</div>
    <div class="gallery-grid">
        <div class="card">
            <img src="iphone-design.png">
            <div class="card-title">iPhone 15 Design</div>
        </div>
        <div class="card">
            <img src="My-Burger-design.png">
            <div class="card-content"><div class="card-title">Burger & Fries Ad</div></div>
        </div>
        <div class="card">
            <img src="Modern-car.png">
            <div class="card-title">Luxury Car Review</div>
        </div>
        <div class="card">
            <img src="House-design.png">
            <div class="card-title">Real Estate Design</div>
        </div>
    </div>

    <div class="section-title">Mera Purana Kaam</div>
    <div class="gallery-grid">
        <div class="card">
            <img src="Black Panther.png">
            <div class="card-title">Black Panther Logo</div>
        </div>
        <div class="card">
            <img src="coffee.png">
            <div class="card-title">Coffee Photography</div>
        </div>
        <div class="card">
            <img src="my digital pic.png">
            <div class="card-title">Digital Profile</div>
        </div>
        <div class="card">
            <img src="penguins.png">
            <div class="card-title">Nature Photography</div>
        </div>
    </div>

</div>

<footer style="text-align: center; padding: 40px; margin-top: 50px; background: rgba(0,0,0,0.8);">
    <p>Contact me: +923036780703</p>
</footer>

</body>
</html>
